[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
  ".git",
  ".cache",
  ".codex_tools",
  ".verify_tools",
  ".venv",
  "__pycache__",
  ".pytest_cache",
  ".pytest_cache_local",
  "htmlcov",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = [
  "B008",
  "E501",
  "E712",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.coverage.run]
source = ["."]
omit = [
  "tests/*",
  "alembic/*",
  ".cache/*",
  ".codex_tools/*",
  ".verify_tools/*",
  ".venv/*",
  "htmlcov/*",
  "scripts/secret_hygiene_check.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
]

[tool.bandit]
exclude_dirs = [
  ".venv",
  ".cache",
  ".codex_tools",
  ".verify_tools",
  "tests",
  "alembic/versions",
  "__pycache__",
  ".pytest_cache",
  ".pytest_cache_local",
  "htmlcov",
]
skips = [
  "B101",
  "B104",
  "B105",
]
