name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      TESTING: "1"
      APP_DEBUG: "0"
      SECRET_KEY: "ci-test-secret-key"
      DATABASE_URL: "sqlite:///./test_jewellery.db"
      RUN_MIGRATIONS_ON_STARTUP: "0"
      FRONTEND_VERIFY_URL: "http://localhost:3000/verify-email"
      FRONTEND_RESET_URL: "http://localhost:3000/reset-password"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest \
            --cov=main \
            --cov=models \
            --cov=schemas \
            --cov=database \
            --cov-report=term-missing \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY} \
            -q
